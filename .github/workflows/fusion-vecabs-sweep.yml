name: ⑦ FLAT vector-absolute-calibration sweep — break the multi_hop↔single tradeoff

# Global vector-trust (27221406266) helped multi_hop but cratered single_hop: relative
# normalisation (vec/max_vec) gives the top candidate 1.0 even on a weak-cosine query, so
# vector-NOISE displaced BM25 gold. SHODH_FLAT_VEC_ABS calibrates the vector leg by ABSOLUTE
# cosine (< floor → 0), so vector contributes only where genuinely confident — query-adaptive
# without a label. Goal: keep the multi_hop gain WITHOUT the single_hop loss → ALL > 0.6853.
#   A=FLAT(abs off, =default 0.6853)  B=abs floor0.2  C=abs floor0.3  D=abs floor0.4

on:
  workflow_dispatch:
  push:
    paths: ['.github/workflows/fusion-vecabs-sweep.yml']
    branches: [exp/ner-gliner-ablation]

jobs:
  vecabs:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      SHODH_MAX_CASES: "300"
      SHODH_MAX_CORPUS: "1500"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: recall-eval
      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Build recall-eval
        run: cargo build --release --bin recall-eval
      - name: Cache MiniLM
        uses: actions/cache@v4
        with:
          path: ~/.cache/shodh-memory/models
          key: shodh-models-minilm-c9745ed1
      - name: Pre-fetch MiniLM
        run: |
          set -o pipefail
          MD="$HOME/.cache/shodh-memory/models/minilm-l6"; mkdir -p "$MD"
          B="https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/c9745ed1d9f207416be6d2e6f8de32d1f16199bf"
          dl() { curl -fL --retry 20 --retry-all-errors --retry-delay 15 --connect-timeout 30 -o "$1" "$2"; }
          [ -s "$MD/model_quantized.onnx" ] || dl "$MD/model_quantized.onnx" "$B/onnx/model_quint8_avx2.onnx"
          [ -s "$MD/tokenizer.json" ]       || dl "$MD/tokenizer.json" "$B/tokenizer.json"

      - name: A recall — abs OFF (FLAT default)
        run: set -o pipefail; ./target/release/recall-eval --suite locomo --repeats 1 --output a.json --storage ./s-a 2>&1 | tail -3
      - name: B recall — abs floor 0.2
        run: set -o pipefail; SHODH_FLAT_VEC_ABS=1 SHODH_FLAT_VEC_FLOOR=0.2 ./target/release/recall-eval --suite locomo --repeats 1 --output b.json --storage ./s-b 2>&1 | tail -3
      - name: C recall — abs floor 0.3
        run: set -o pipefail; SHODH_FLAT_VEC_ABS=1 SHODH_FLAT_VEC_FLOOR=0.3 ./target/release/recall-eval --suite locomo --repeats 1 --output c.json --storage ./s-c 2>&1 | tail -3
      - name: D recall — abs floor 0.4
        run: set -o pipefail; SHODH_FLAT_VEC_ABS=1 SHODH_FLAT_VEC_FLOOR=0.4 ./target/release/recall-eval --suite locomo --repeats 1 --output d.json --storage ./s-d 2>&1 | tail -3
      - name: A funnel — abs OFF
        run: set -o pipefail; ./target/release/recall-eval --suite locomo --output oa.json --funnel fa.json --storage ./s-fa 2>&1 | tail -3
      - name: C funnel — abs floor 0.3
        run: set -o pipefail; SHODH_FLAT_VEC_ABS=1 SHODH_FLAT_VEC_FLOOR=0.3 ./target/release/recall-eval --suite locomo --output oc.json --funnel fc.json --storage ./s-fc 2>&1 | tail -3

      - name: Compare
        if: always()
        run: |
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          def load(f):
              try: return json.load(open(f))
              except Exception: return None
          arms={'abs.off':load('a.json'),'f0.2':load('b.json'),'f0.3':load('c.json'),'f0.4':load('d.json')}
          def rec(d,cat):
              if not d: return float('nan')
              return d['layers']['full']['recall@10'] if cat=='ALL' else d['by_category'][cat]['recall@10']
          cats=['ALL','single_hop','multi_hop','temporal','open_domain']
          names=list(arms.keys())
          print("## ⑦ FLAT vector-absolute-calibration sweep — recall@10 (baseline abs.off=0.6853)\n")
          print("| cat | "+" | ".join(names)+" |")
          print("| --- "*(len(names)+1)+"|")
          for cat in cats:
              print(f"| {cat} | "+" | ".join(f"{rec(arms[n],cat):.4f}" for n in names)+" |")
          print("\n**Δ ALL vs abs.off:** "+", ".join(f"{n} {rec(arms[n],'ALL')-rec(arms['abs.off'],'ALL'):+.4f}" for n in names if n!='abs.off'))
          print("**Δ single_hop:** "+", ".join(f"{n} {rec(arms[n],'single_hop')-rec(arms['abs.off'],'single_hop'):+.4f}" for n in names if n!='abs.off'))
          print("**Δ multi_hop:** "+", ".join(f"{n} {rec(arms[n],'multi_hop')-rec(arms['abs.off'],'multi_hop'):+.4f}" for n in names if n!='abs.off'))
          def g(fn,stage,k):
              if not fn: return float('nan')
              for r in fn.get('overall',[]):
                  if r['stage']==stage: return r.get(k,float('nan'))
              return float('nan')
          fa=load('fa.json'); fc=load('fc.json')
          print("\n### funnel FUSION — abs.off vs f0.3\n| metric | off | f0.3 |")
          print("| --- | --- | --- |")
          for k in ('present_pct','top10_pct','mean_rank_when_present'):
              print(f"| fusion {k} | {g(fa,'fusion',k):.2f} | {g(fc,'fusion',k):.2f} |")
          print("\n**Decision:** an abs floor lifts ALL > 0.6853 with single_hop NOT regressing (≥0.7515) AND multi_hop holding the +gain ⇒ absolute calibration breaks the tradeoff → fold best floor into the FLAT default (PR). single_hop still drops ⇒ the asymmetry (abs vector vs relative bm25) bites → pivot to learned weights (C). multi_hop loses its gain ⇒ floor too high, vector gold suppressed.")
          PY

      - name: Upload JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fusion-vecabs-json
          path: "*.json"
          if-no-files-found: warn
